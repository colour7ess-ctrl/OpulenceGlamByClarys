<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opulence Glam | Panel de Control</title>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #F9F8F3; color: #3E5336; }
        .playfair { font-family: 'Playfair Display', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3E533620; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // Componente de Icono para Lucide
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: { strokeWidth: 2, width: size, height: size, class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        // Configuración Global
        const WHATSAPP_NUMBER = "50765072741";
        const INSTAGRAM_HANDLE = "opulenceglamm";
        const ADMIN_PASSWORD = "cantepi2022";
        const PRESET_BRANDS = ['Todas', 'Beauty Creations', 'Italia Deluxe', 'Beau Visage', 'Dolce Bella'];
        const CATEGORIES = ['Todos', 'Lip Gloss', 'Lip Oils', 'Blush', 'Tintas de labios', 'Lip Liner', 'Iluminadores'];

        function App() {
            // Estado de Productos (Cargamos de LocalStorage para persistencia local)
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('opulence_products');
                return saved ? JSON.parse(saved) : [];
            });

            const [siteSettings, setSiteSettings] = useState(() => {
                const saved = localStorage.getItem('opulence_settings');
                return saved ? JSON.parse(saved) : {
                    aboutText: '"Opulence Glam nace de la pasión por realzar la belleza natural con productos de alta gama."',
                    contactQuote: '"Elevando los estándares de la estética personal."'
                };
            });

            const [isEditMode, setIsEditMode] = useState(false);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [currentView, setCurrentView] = useState('catalog'); 
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [editingProduct, setEditingProduct] = useState(null);
            const [selectedBrand, setSelectedBrand] = useState('Todas');
            const [selectedCategory, setSelectedCategory] = useState('Todos');
            const [showBrandMenu, setShowBrandMenu] = useState(false);

            // Guardar cambios automáticamente
            useEffect(() => {
                localStorage.setItem('opulence_products', JSON.stringify(products));
            }, [products]);

            useEffect(() => {
                localStorage.setItem('opulence_settings', JSON.stringify(siteSettings));
            }, [siteSettings]);

            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchBrand = selectedBrand === 'Todas' || p.brand === selectedBrand;
                    const matchCat = selectedCategory === 'Todos' || p.category === selectedCategory;
                    return matchBrand && matchCat;
                });
            }, [products, selectedBrand, selectedCategory]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsEditMode(true);
                    setShowAuthModal(false);
                    setPasswordInput("");
                } else {
                    alert("Contraseña incorrecta");
                }
            };

            const saveProduct = (p) => {
                const exists = products.find(item => item.id === p.id);
                if (exists) {
                    setProducts(products.map(item => item.id === p.id ? p : item));
                } else {
                    setProducts([...products, p]);
                }
                setEditingProduct(null);
            };

            const deleteProduct = (id) => {
                if(confirm("¿Eliminar este producto?")) {
                    setProducts(products.filter(p => p.id !== id));
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-[#F9F8F3]/90 backdrop-blur-md border-b border-[#3E5336]/10 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <nav className="hidden md:flex space-x-6 text-[9px] tracking-[0.2em] uppercase font-bold">
                                <button onClick={() => setCurrentView('catalog')} className={currentView === 'catalog' ? 'text-[#A8BCA1]' : ''}>Catálogo</button>
                                <button onClick={() => setCurrentView('about')} className={currentView === 'about' ? 'text-[#A8BCA1]' : ''}>Nosotros</button>
                                <button onClick={() => setCurrentView('contact')} className={currentView === 'contact' ? 'text-[#A8BCA1]' : ''}>Contacto</button>
                            </nav>
                            <div className="text-center cursor-pointer" onClick={() => setCurrentView('catalog')}>
                                <h1 className="text-xl md:text-2xl uppercase tracking-[0.3em] font-light playfair">Opulence Glam</h1>
                                <p className="text-[8px] tracking-[0.4em] opacity-60 uppercase">By Clarys</p>
                            </div>
                            <button onClick={() => isEditMode ? setIsEditMode(false) : setShowAuthModal(true)} className={`p-2 rounded-full ${isEditMode ? 'bg-[#3E5336] text-white shadow-lg' : 'hover:bg-[#3E5336]/5'}`}>
                                <Icon name="Settings" size={18} />
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 py-12">
                        {currentView === 'catalog' && (
                            <div className="animate-fade-in">
                                {/* Filtros */}
                                <div className="flex flex-wrap justify-center gap-4 mb-16">
                                    <button onClick={() => setShowBrandMenu(!showBrandMenu)} className="px-8 py-3 bg-white border border-[#3E5336]/10 text-[10px] uppercase font-bold tracking-widest hover:border-[#3E5336] transition-all flex items-center gap-2">
                                        <Icon name="Filter" size={14} /> Marca: {selectedBrand}
                                    </button>
                                    {showBrandMenu && (
                                        <div className="absolute mt-12 w-64 bg-white shadow-2xl z-50 border border-[#3E5336]/5">
                                            {PRESET_BRANDS.map(b => (
                                                <button key={b} onClick={() => {setSelectedBrand(b); setShowBrandMenu(false);}} className="w-full text-left px-6 py-4 text-[9px] uppercase font-bold hover:bg-gray-50">{b}</button>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* Grilla */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
                                    {isEditMode && (
                                        <div onClick={() => setEditingProduct({ id: Date.now(), name: '', brand: 'Beauty Creations', category: 'Lip Gloss', variants: [], coverImage: '', isAvailable: true })} className="aspect-[3/4] border-2 border-dashed border-[#3E5336]/20 flex flex-col items-center justify-center cursor-pointer hover:bg-white rounded-sm">
                                            <Icon name="Plus" size={32} className="opacity-20 mb-2" />
                                            <span className="text-[9px] uppercase font-bold tracking-widest">Nuevo Producto</span>
                                        </div>
                                    )}
                                    {filteredProducts.map(p => (
                                        <div key={p.id} className="group relative" onClick={() => !isEditMode && setSelectedProduct(p)}>
                                            <div className="aspect-[3/4] bg-white overflow-hidden mb-4 rounded-sm border border-[#3E5336]/5 relative">
                                                {p.coverImage ? <img src={p.coverImage} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center italic opacity-20 text-[10px]">Sin imagen</div>}
                                                {isEditMode && (
                                                    <div className="absolute top-2 right-2 flex gap-1">
                                                        <button onClick={(e) => { e.stopPropagation(); setEditingProduct(p); }} className="p-2 bg-white rounded-full shadow-md"><Icon name="Edit3" size={14} /></button>
                                                        <button onClick={(e) => { e.stopPropagation(); deleteProduct(p.id); }} className="p-2 bg-white rounded-full shadow-md text-red-500"><Icon name="Trash2" size={14} /></button>
                                                    </div>
                                                )}
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[8px] uppercase tracking-widest text-[#A8BCA1] font-bold">{p.brand}</p>
                                                <h3 className="playfair text-lg">{p.name}</h3>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Otros views (About/Contact) resumidos por brevedad */}
                        {currentView === 'about' && (
                            <div className="max-w-2xl mx-auto py-20 text-center animate-fade-in">
                                <h2 className="text-3xl playfair italic mb-8">Nuestra Historia</h2>
                                <p className="text-lg italic opacity-70">{siteSettings.aboutText}</p>
                                {isEditMode && <button onClick={() => setSiteSettings({...siteSettings, aboutText: prompt("Editar texto:", siteSettings.aboutText)})} className="mt-4 text-[10px] underline uppercase font-bold">Editar Visión</button>}
                            </div>
                        )}
                    </main>

                    {/* Modal Editor de Producto (La clave del Modo Creador) */}
                    {editingProduct && (
                        <div className="fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-[#F9F8F3] w-full max-w-2xl p-8 rounded-sm max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <h2 className="text-center playfair text-2xl mb-8 uppercase tracking-widest">Editor de Producto</h2>
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-[9px] uppercase font-bold opacity-40">Nombre</label>
                                            <input type="text" value={editingProduct.name} onChange={e => setEditingProduct({...editingProduct, name: e.target.value})} className="w-full p-3 border outline-none" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[9px] uppercase font-bold opacity-40">Marca</label>
                                            <select value={editingProduct.brand} onChange={e => setEditingProduct({...editingProduct, brand: e.target.value})} className="w-full p-3 border">
                                                {PRESET_BRANDS.slice(1).map(b => <option key={b} value={b}>{b}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[9px] uppercase font-bold opacity-40">Imagen de Portada (Subir Archivo)</label>
                                        <input type="file" accept="image/*" onChange={e => {
                                            const file = e.target.files[0];
                                            if (file) {
                                                const reader = new FileReader();
                                                reader.onloadend = () => setEditingProduct({...editingProduct, coverImage: reader.result});
                                                reader.readAsDataURL(file);
                                            }
                                        }} className="w-full text-xs" />
                                    </div>
                                    <div className="flex gap-4 pt-6">
                                        <button onClick={() => setEditingProduct(null)} className="flex-1 py-4 border uppercase text-[10px] font-bold">Cancelar</button>
                                        <button onClick={() => saveProduct(editingProduct)} className="flex-1 py-4 bg-[#3E5336] text-white uppercase text-[10px] font-bold">Guardar Cambios</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Login */}
                    {showAuthModal && (
                        <div className="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4">
                            <form onSubmit={handleLogin} className="bg-white p-10 max-w-sm w-full text-center space-y-6">
                                <h3 className="text-[10px] uppercase font-bold tracking-widest">Contraseña de Administrador</h3>
                                <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full p-4 border text-center" autoFocus />
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setShowAuthModal(false)} className="flex-1 py-3 text-[9px] border uppercase">Cerrar</button>
                                    <button type="submit" className="flex-1 py-3 bg-[#3E5336] text-white text-[9px] uppercase">Entrar</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
