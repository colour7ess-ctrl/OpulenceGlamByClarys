<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opulence Glam | Catálogo de Belleza</title>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #F9F8F3; color: #3E5336; }
        .playfair { font-family: 'Playfair Display', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3E533620; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        /**
         * Componente Icon corregido para usar lucide.createIcons
         * Esto evita el error "toSvg is not a function"
         */
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = React.useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: {
                            strokeWidth: 2,
                            width: size,
                            height: size,
                            class: className
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);

            return <i ref={iconRef} data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        // Firebase Config simulada para entorno local/GitHub
        const appId = 'opulence-glam-v2';

        // Constantes del sitio
        const WHATSAPP_NUMBER = "50765072741";
        const INSTAGRAM_URL = "https://www.instagram.com/opulenceglamm?igsh=MXBtNjF3eHl1ZDhlNQ==";
        const INSTAGRAM_HANDLE = "opulenceglamm";
        const ADMIN_PASSWORD = "cantepi2022";
        const PRESET_BRANDS = ['Todas', 'Beauty Creations', 'Italia Deluxe', 'Beau Visage', 'Dolce Bella'];
        const CATEGORIES = ['Todos', 'Lip Gloss', 'Lip Oils', 'Blush', 'Tintas de labios', 'Lip Liner', 'Iluminadores'];

        // Datos de ejemplo para que la web no nazca vacía en el Bloc de Notas
        const INITIAL_PRODUCTS = [
            {
                id: '1',
                name: 'Velvet Lip Glaze',
                brand: 'Beauty Creations',
                category: 'Lip Gloss',
                coverImage: 'https://images.unsplash.com/photo-1586776977607-310e9c725c37?auto=format&fit=crop&q=80&w=800',
                isAvailable: true,
                description: 'Brillo labial de larga duración con acabado aterciopelado.',
                variants: [
                    { id: 'v1', colorHex: '#E2918F', shadeName: 'Rosewood', isAvailable: true },
                    { id: 'v2', colorHex: '#C56B6B', shadeName: 'Deep Berry', isAvailable: true }
                ]
            },
            {
                id: '2',
                name: 'Hydro Bloom Lip Oil',
                brand: 'Italia Deluxe',
                category: 'Lip Oils',
                coverImage: 'https://images.unsplash.com/photo-1625093742435-6fa192b6fb10?auto=format&fit=crop&q=80&w=800',
                isAvailable: true,
                description: 'Aceite hidratante que reacciona al pH de tus labios.',
                variants: [
                    { id: 'v3', colorHex: '#FFD1DC', shadeName: 'Clear Pink', isAvailable: true }
                ]
            }
        ];

        function App() {
            const [products, setProducts] = useState(INITIAL_PRODUCTS);
            const [siteSettings, setSiteSettings] = useState({
                aboutText: '"Opulence Glam nace de la pasión por realzar la belleza natural con productos de alta gama y asesoría personalizada."',
                contactQuote: '"Elevando los estándares de la estética personal a través de una curaduría exclusiva de cosméticos de alta gama."'
            });
            const [isEditMode, setIsEditMode] = useState(false);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [currentView, setCurrentView] = useState('catalog'); 
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedBrand, setSelectedBrand] = useState('Todas');
            const [selectedCategory, setSelectedCategory] = useState('Todos');
            const [showBrandMenu, setShowBrandMenu] = useState(false);

            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchBrand = selectedBrand === 'Todas' || p.brand === selectedBrand;
                    const matchCat = selectedCategory === 'Todos' || p.category === selectedCategory;
                    return matchBrand && matchCat;
                });
            }, [products, selectedBrand, selectedCategory]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsEditMode(true);
                    setShowAuthModal(false);
                    setPasswordInput("");
                } else {
                    alert("Contraseña incorrecta");
                }
            };

            const openWhatsApp = (msg) => {
                const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
                window.open(url, '_blank');
            };

            return (
                <div className="min-h-screen">
                    <header className="sticky top-0 z-40 bg-[#F9F8F3]/90 backdrop-blur-md border-b border-[#3E5336]/10 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-4 grid grid-cols-3 items-center">
                            <nav className="hidden md:flex space-x-6 text-[9px] tracking-[0.2em] uppercase font-bold">
                                <button onClick={() => setCurrentView('catalog')} className={`hover:text-[#A8BCA1] transition-colors ${currentView === 'catalog' ? 'text-[#A8BCA1]' : ''}`}>Catálogo</button>
                                <button onClick={() => setCurrentView('about')} className={`hover:text-[#A8BCA1] transition-colors ${currentView === 'about' ? 'text-[#A8BCA1]' : ''}`}>Nosotros</button>
                                <button onClick={() => setCurrentView('contact')} className={`hover:text-[#A8BCA1] transition-colors ${currentView === 'contact' ? 'text-[#A8BCA1]' : ''}`}>Contacto</button>
                            </nav>
                            <div className="md:hidden"></div>
                            <div className="text-center cursor-pointer" onClick={() => setCurrentView('catalog')}>
                                <h1 className="text-xl md:text-2xl uppercase tracking-[0.3em] font-light playfair">Opulence Glam</h1>
                                <p className="text-[8px] tracking-[0.4em] opacity-60 uppercase">By Clarys</p>
                            </div>
                            <div className="flex items-center justify-end space-x-4">
                                <button onClick={() => isEditMode ? setIsEditMode(false) : setShowAuthModal(true)} className={`p-2 rounded-full transition-all ${isEditMode ? 'bg-[#3E5336] text-white shadow-lg' : 'hover:bg-[#3E5336]/5'}`}>
                                    <Icon name="Settings" size={18} />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-12">
                        {currentView === 'catalog' && (
                            <div className="animate-fade-in">
                                <div className="flex flex-col md:flex-row items-center justify-center gap-4 mb-16">
                                    <div className="relative">
                                        <button onClick={() => setShowBrandMenu(!showBrandMenu)} className="flex items-center gap-3 px-8 py-3 bg-white border border-[#3E5336]/10 text-[10px] uppercase font-bold tracking-widest hover:border-[#3E5336] transition-all">
                                            <Icon name="Filter" size={14} /> Marcas: {selectedBrand}
                                            <Icon name="ChevronDown" size={14} className={showBrandMenu ? 'rotate-180 transition-transform' : 'transition-transform'} />
                                        </button>
                                        {showBrandMenu && (
                                            <div className="absolute top-full left-0 mt-2 w-64 bg-white shadow-2xl z-50 border border-[#3E5336]/5">
                                                {PRESET_BRANDS.map(brand => (
                                                    <button key={brand} onClick={() => { setSelectedBrand(brand); setShowBrandMenu(false); setSelectedCategory('Todos'); }} className={`w-full text-left px-6 py-4 text-[9px] uppercase font-bold tracking-widest hover:bg-[#F9F8F3] border-b border-gray-50 last:border-none ${selectedBrand === brand ? 'text-[#A8BCA1]' : ''}`}>
                                                        {brand}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    {selectedBrand !== 'Todas' && (
                                        <div className="flex flex-wrap justify-center gap-2">
                                            {CATEGORIES.map(cat => (
                                                <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-4 py-2 text-[9px] uppercase font-bold tracking-widest transition-all rounded-full border ${selectedCategory === cat ? 'bg-[#3E5336] text-white border-[#3E5336]' : 'bg-white text-[#3E5336] border-[#3E5336]/10 hover:border-[#3E5336]'}`}>{cat}</button>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
                                    {filteredProducts.map(product => (
                                        <div key={product.id} className="group cursor-pointer" onClick={() => setSelectedProduct(product)}>
                                            <div className="relative aspect-[3/4] overflow-hidden bg-white mb-4 rounded-sm shadow-sm border border-[#3E5336]/5">
                                                {product.coverImage ? (
                                                    <img src={product.coverImage} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt={product.name} />
                                                ) : <div className="w-full h-full flex items-center justify-center bg-gray-50 italic text-[10px] opacity-30">Sin Portada</div>}
                                                <div className="absolute top-4 left-4">
                                                   <span className={`px-3 py-1 text-[8px] uppercase font-bold tracking-widest shadow-sm ${product.isAvailable ? 'bg-white/90' : 'bg-red-500 text-white'}`}>
                                                      {product.isAvailable ? 'Colección' : 'Agotado'}
                                                   </span>
                                                </div>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[8px] uppercase tracking-[0.2em] text-[#A8BCA1] font-bold mb-1">{product.brand} • {product.category}</p>
                                                <h3 className="text-md font-medium text-[#3E5336] mb-3 playfair">{product.name}</h3>
                                                <div className="flex justify-center gap-1.5">
                                                    {product.variants?.map(v => (
                                                        <div key={v.id} className={`w-3 h-3 rounded-full border border-black/5 ${!v.isAvailable ? 'opacity-30' : ''}`} style={{ backgroundColor: v.colorHex }} />
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {filteredProducts.length === 0 && (
                                        <div className="col-span-full py-20 text-center opacity-30 italic text-sm">No se encontraron productos en esta sección.</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {currentView === 'about' && (
                            <div className="max-w-4xl mx-auto py-24 text-center animate-fade-in">
                                <h2 className="text-4xl italic mb-8 font-light playfair">Nuestra Visión</h2>
                                <div className="w-20 h-0.5 bg-[#3E5336] mx-auto opacity-20 mb-12"></div>
                                <p className="text-xl font-light italic opacity-70 leading-relaxed max-w-2xl mx-auto">{siteSettings.aboutText}</p>
                            </div>
                        )}

                        {currentView === 'contact' && (
                            <div className="max-w-5xl mx-auto py-24 px-4 animate-fade-in">
                                <div className="text-center mb-20">
                                    <h2 className="text-4xl italic mb-6 font-light playfair">Atención Personalizada</h2>
                                    <div className="w-20 h-0.5 bg-[#3E5336] mx-auto opacity-20"></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="bg-white p-12 shadow-xl flex flex-col justify-center space-y-12">
                                        <button onClick={() => openWhatsApp("Hola!")} className="flex items-center gap-6 group hover:text-[#A8BCA1] transition-colors text-left">
                                            <div className="w-14 h-14 rounded-full bg-[#F9F8F3] flex items-center justify-center group-hover:bg-[#3E5336] group-hover:text-white transition-all"><Icon name="MessageCircle" size={24}/></div>
                                            <div>
                                                <p className="text-sm font-bold tracking-widest uppercase">Consultar por WhatsApp</p>
                                                <p className="text-[9px] opacity-60 tracking-wider">Atención Directa</p>
                                            </div>
                                        </button>
                                        <a href={INSTAGRAM_URL} target="_blank" className="flex items-center gap-6 group hover:text-[#A8BCA1] transition-colors text-left">
                                            <div className="w-14 h-14 rounded-full bg-[#F9F8F3] flex items-center justify-center group-hover:bg-[#3E5336] group-hover:text-white transition-all"><Icon name="Instagram" size={24}/></div>
                                            <div>
                                                <p className="text-sm font-bold tracking-widest uppercase">@{INSTAGRAM_HANDLE}</p>
                                                <p className="text-[9px] opacity-60 tracking-wider">Lanzamientos & Tutoriales</p>
                                            </div>
                                        </a>
                                    </div>
                                    <div className="bg-[#3E5336] p-16 flex items-center justify-center text-center text-white">
                                        <div className="space-y-8">
                                            <Icon name="Tag" size={48} className="mx-auto opacity-30" />
                                            <p className="text-2xl font-light italic leading-relaxed">{siteSettings.contactQuote}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {selectedProduct && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onClick={() => setSelectedProduct(null)}>
                            <div className="bg-[#F9F8F3] w-full max-w-4xl rounded-sm shadow-2xl overflow-hidden flex flex-col md:flex-row relative max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedProduct(null)} className="absolute top-6 right-6 z-20 bg-white p-2 rounded-full"><Icon name="X" size={20} /></button>
                                <div className="md:w-1/2 bg-white">
                                    <img src={selectedProduct.coverImage} className="w-full h-full object-cover" alt={selectedProduct.name} />
                                </div>
                                <div className="md:w-1/2 p-10 overflow-y-auto">
                                    <h2 className="text-3xl playfair mb-4">{selectedProduct.name}</h2>
                                    <p className="text-[10px] uppercase font-bold tracking-widest text-[#A8BCA1] mb-6">{selectedProduct.brand}</p>
                                    <div className="mb-8">
                                        <p className="text-[9px] uppercase font-bold mb-3 opacity-40">Tonos Disponibles</p>
                                        <div className="flex flex-wrap gap-2">
                                            {selectedProduct.variants?.map(v => (
                                                <div key={v.id} className="w-7 h-7 rounded-full border border-black/10 shadow-sm" style={{ backgroundColor: v.colorHex }} title={v.shadeName} />
                                            ))}
                                        </div>
                                    </div>
                                    <p className="text-sm italic mb-10 opacity-70">{selectedProduct.description || "Producto exclusivo de Opulence Glam."}</p>
                                    <button onClick={() => openWhatsApp(`Interés en: ${selectedProduct.name}`)} className="w-full py-4 bg-[#3E5336] text-white text-[10px] uppercase font-bold tracking-[0.2em] hover:bg-black transition-all">Consultar Disponibilidad</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAuthModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4">
                            <div className="bg-[#F9F8F3] p-10 max-w-sm w-full rounded-sm text-center">
                                <h3 className="text-[11px] uppercase font-bold tracking-[0.3em] mb-6">Acceso Admin</h3>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Contraseña" className="w-full p-4 text-center border outline-none" />
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setShowAuthModal(false)} className="flex-1 py-3 text-[9px] uppercase font-bold border">Cerrar</button>
                                        <button type="submit" className="flex-1 py-3 text-[9px] uppercase font-bold bg-[#3E5336] text-white">Entrar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="bg-white border-t border-[#3E5336]/5 py-20 text-center">
                        <h2 className="text-2xl mb-8 uppercase tracking-[0.4em] font-light playfair">Opulence Glam</h2>
                        <p className="text-[8px] font-bold tracking-[0.3em] opacity-30 uppercase">&copy; {new Date().getFullYear()} Opulence Glam by Clarys.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
